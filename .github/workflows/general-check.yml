name: General check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-code:
    if: |
      !contains(github.event.pull_request.labels.*.name, 'CI-Release')
    runs-on: ubuntu-latest
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      # Disable daemon process to prevent hangs in CI
      NX_DAEMON: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set SHAs for Nx affected
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: master

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Reset Nx
        run: |
          npx nx reset
          rm -rf .nx/cache/cloud

      # Build fe-scripts with NX Cloud (daemon disabled to prevent hangs)
      - name: Build fe-scripts
        timeout-minutes: 5
        run: npx nx build @qlover/fe-scripts
      
      # Build all packages with NX Cloud acceleration
      - name: Build packages (exclude examples)
        timeout-minutes: 10
        run: pnpm build:packages
        
      # Lint with NX Cloud cache for speed
      - name: Lint
        timeout-minutes: 5
        run: pnpm lint

      # 普通 task
      # - name: Build (affected force)
      #   run: pnpm build:force
      # - run: pnpm lint
      - run: pnpm test
      - run: pnpm rebuild

      - name: Check packages
        if: github.event.pull_request.base.ref == 'master'
        run: |
          git fetch origin ${{ github.base_ref }}
          pnpm run check-packages -V -r ${{ github.repository }} -b ${{ github.base_ref }} -n ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
