name: General check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-code:
    # Skip if has CI-Release label
    if: |
      !contains(github.event.pull_request.labels.*.name, 'CI-Release')
    runs-on: ubuntu-latest
    env:
      # Allow using Nx cache restored from previous CI runs (different machine)
      NX_REJECT_UNKNOWN_LOCAL_CACHE: 0

    steps:
      # - name: Print GitHub Event Information
      #   run: echo "${{ toJson(github.event.pull_request) }}" > event.json
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Restore Nx cache
        uses: actions/cache/restore@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build (affected)
        run: pnpm nx affected:build --base=origin/${{ github.base_ref }} --head=HEAD --parallel --maxParallel=4

      - name: Save Nx cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm rebuild

      # Only run package checks when targeting master
      - name: Check packages
        if: github.event.pull_request.base.ref == 'master'
        run: |
          git fetch origin ${{ github.base_ref }}
          pnpm run check-packages -V -r ${{ github.repository }} -b ${{ github.base_ref }} -n ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
