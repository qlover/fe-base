name: General check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-code:
    if: |
      !contains(github.event.pull_request.labels.*.name, 'CI-Release')
    runs-on: ubuntu-latest
    env:
      # NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      # Disable daemon process to prevent hangs in CI
      NX_DAEMON: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set SHAs for Nx affected
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: master

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      
      - name: Cache NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ github.ref_name }}-
            nx-cache-master-
      
      - name: Build packages (exclude examples)
        timeout-minutes: 10
        run: pnpm build:packages
        
      - name: Lint
        timeout-minutes: 5
        run: pnpm lint

      - run: pnpm test
      - run: pnpm rebuild
