name: Release sub packages

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - master
    types:
      - closed
      - labeled
    paths:
      - packages/**

jobs:
  # develop PR with CI-Release -> version bump + create release PR to master
  create-release-pr:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.base.ref == 'develop' &&
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'CI-Release') &&
        (
          github.event.action == 'closed' ||
          (
            github.event.action == 'labeled' &&
            github.event.label.name == 'CI-Release'
          )
        )
      )
    runs-on: ubuntu-latest
    env:
      # NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_DAEMON: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          fetch-tags: true

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build (affected force)
        timeout-minutes: 15
        run: pnpm build:packages:force

      - name: Lint
        timeout-minutes: 5
        run: pnpm lint:force

      - name: Test
        timeout-minutes: 10
        run: pnpm test:force

      - run: pnpm rebuild

      - name: Create release PR to master (from develop merge)
        if: github.event_name == 'pull_request'
        run: |
          node packages/fe-release/dist/cli.js -V \
            -s master \
            --github.push-change-labels \
            --changesetVersion.ignore-non-updated-packages \
            --workspaces.change-labels=${{ join(github.event.pull_request.labels.*.name, ',') }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          FE_RELEASE_BRANCH: develop

      - name: Create release PR to master (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          node packages/fe-release/dist/cli.js -V \
            -s master \
            --github.push-change-labels \
            --changesetVersion.ignore-non-updated-packages
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          FE_RELEASE_BRANCH: develop

  # CI-Release PR merged to master -> publish to npm and GitHub
  publish:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      contains(github.event.pull_request.labels.*.name, 'CI-Release')
    runs-on: ubuntu-latest
    env:
      # NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_DAEMON: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build (affected force)
        timeout-minutes: 15
        run: pnpm build:packages:force

      - name: Lint
        timeout-minutes: 5
        run: pnpm lint:force

      - name: Test
        timeout-minutes: 10
        run: pnpm test:force

      - run: pnpm rebuild

      - name: Create tag and publish
        run: |
          node packages/fe-release/dist/cli.js -V \
            --changesetVersion.skip-changeset \
            --changesetVersion.mode publish \
            --workspaces.change-labels=${{ join(github.event.pull_request.labels.*.name, ',') }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
