name: Release sub packages

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    types:
      - closed
    paths:
      - packages/**

concurrency:
  group: release-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # PR merged to master with CI-Release (non-release head) -> version bump + create release PR
  create-release-pr:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'master' &&
        !startsWith(github.event.pull_request.head.ref, 'release/') &&
        contains(github.event.pull_request.labels.*.name, 'CI-Release')
      )
    runs-on: ubuntu-latest
    env:
      # NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_DAEMON: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build (affected force)
        timeout-minutes: 15
        run: pnpm build:packages:force

      - name: Lint
        timeout-minutes: 5
        run: pnpm lint:force

      - name: Test
        timeout-minutes: 10
        run: pnpm test:force

      - run: pnpm rebuild

      - name: Create release PR to master
        if: github.event_name == 'pull_request'
        run: |
          INCREMENT=patch
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'increment:major') }}" == "true" ]]; then
            INCREMENT=major
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'increment:minor') }}" == "true" ]]; then
            INCREMENT=minor
          fi
          echo "Using version increment: $INCREMENT"
          node packages/fe-release/dist/cli.js -V \
            -s master \
            -i "$INCREMENT" \
            --workspaces.compare-ref "${{ github.event.pull_request.base.sha }}" \
            --changesetVersion.ignore-non-updated-packages
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          FE_RELEASE_BRANCH: master

      - name: Create release PR to master (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          node packages/fe-release/dist/cli.js -V \
            -s master \
            --changesetVersion.ignore-non-updated-packages
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          FE_RELEASE_BRANCH: master

  # release/* PR merged to master with CI-Release -> publish to npm and GitHub
  publish:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      startsWith(github.event.pull_request.head.ref, 'release/') &&
      contains(github.event.pull_request.labels.*.name, 'CI-Release')
    runs-on: ubuntu-latest
    env:
      # NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_DAEMON: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build (affected force)
        timeout-minutes: 15
        run: pnpm build:packages:force

      - name: Lint
        timeout-minutes: 5
        run: pnpm lint:force

      - name: Test
        timeout-minutes: 10
        run: pnpm test:force

      - run: pnpm rebuild

      - name: Create tag and publish
        run: |
          node packages/fe-release/dist/cli.js -V \
            --changesetVersion.skip-changeset \
            --changesetVersion.mode publish
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
